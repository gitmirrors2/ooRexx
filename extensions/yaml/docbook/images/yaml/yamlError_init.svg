               rect.terminal         {fill: #CCCCCC; stroke: #1F1F1F;}
               rect.nonterminal      {fill: #E3E3E3; stroke: #1F1F1F;}
               rect.text             {fill: none; stroke: none;}
               polygon.regexp        {fill: #EFEFEF; stroke: #1F1F1F;}

